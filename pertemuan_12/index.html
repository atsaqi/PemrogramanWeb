<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Database</title>
    <style>
        .img-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .img-container img {
            width: 67%;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }
    </style>
</head>
<body>
    <div class="img-container">
        <img src="images/struktur.jpg" alt="structure">
    </div>

    <div class="img-container">
        <img src="images/desainer.jpg" alt="designer">
    </div>
</body>
</html>
