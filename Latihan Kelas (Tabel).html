<!DOCTYPE html>
<html>
	<head>
		<title>
            Latihan Kelas (Tabel)
        </title>
	</head>
	<body>
        <p>1. Membuat Tabel</p>
        <table style="margin-left: 16px;" border="1">
            <tr>
                <th rowspan="2">Nama</th>
                <th colspan="3">Nilai</th>
            </tr>
            <tr>
                <th>Kimia</th>
                <th>Fisika</th>
                <th>Biologi</th>
            </tr>
            <tr>
                <td>Robby</td>
                <td>76</td>
                <td>80</td>
                <td>81</td>
            </tr>
            <tr>
                <td>Rendi</td>
                <td>84</td>
                <td>70</td>
                <td>75</td>
            </tr>
            <tr>
                <td>Alfian</td>
                <td>96</td>
                <td>70</td>
                <td>71</td>
            </tr>
        </table>
        <p>2. Membuat Login</p>
        <p style="margin-left: 16px; margin-bottom: 5px; margin-top: 5px;">Login</p>
        <form method="post" action="Halaman Tidak Tersedia">
            <table style="margin-left: 16px;" border="1">
                <tr>
                    <td>User:</td>
                    <td><input type="text" name="user" size="20"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password" size="20"></td>
                </tr>
            </table>
            <input style="margin-left: 16px;" type="checkbox" value="Remember me"> Remember me <br>
            <input style="margin-left: 16px;" type="submit" value="Login">
        </form>
	</body>
</html>
